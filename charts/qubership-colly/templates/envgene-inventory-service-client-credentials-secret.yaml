{{- if not .Values.colly.envgeneInventoryService.cloudCoreSupport }}
---
kind: Secret
apiVersion: v1
metadata:
  name: {{ .Values.colly.envgeneInventoryService.serviceName }}-client-credentials
  labels:
    name: {{ .Values.colly.envgeneInventoryService.serviceName }}-client-credentials
    app.kubernetes.io/name: {{ .Values.colly.envgeneInventoryService.serviceName }}-client-credentials
    app.kubernetes.io/version: {{ .Chart.Version }}
data:
  name: {{ .Values.colly.envgeneInventoryService.idp.clientId | b64enc | quote }}
  password: {{ .Values.colly.envgeneInventoryService.idp.clientSecret | default "" | b64enc | quote }}
{{- end }}