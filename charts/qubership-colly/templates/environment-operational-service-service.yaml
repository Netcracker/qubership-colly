---
apiVersion: v1
kind: Service
metadata:
  annotations:
    app.quarkus.io/quarkus-version: 3.27.2
  labels:
    name: {{ .Values.colly.environmentOperationalService.serviceName }}
    app.kubernetes.io/name: {{ .Values.colly.environmentOperationalService.serviceName }}
    app.kubernetes.io/part-of: qubership-colly
    app.kubernetes.io/managed-by: {{ .Values.MANAGED_BY }}
  name: {{ .Values.colly.environmentOperationalService.serviceName }}
spec:
  ports:
    - name: web
      port: 8080
      protocol: TCP
      targetPort: {{ .Values.colly.environmentOperationalService.ports.http }}
  selector:
    name: {{ .Values.colly.environmentOperationalService.serviceName }}
  type: ClusterIP
